version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: leafleter-backend
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite+aiosqlite:///data/leafleter.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - REDIS_URL=redis://redis:6379/0
      - OBJECT_STORAGE_ENDPOINT=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin
      - OBJECT_STORAGE_BUCKET=leafleter
    volumes:
      - backend_data:/app/data
    depends_on:
      - redis
      - minio
    networks:
      - leafleter
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: leafleter-scheduler
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.scheduler"]
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite+aiosqlite:///data/leafleter.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - REDIS_URL=redis://redis:6379/0
      - OBJECT_STORAGE_ENDPOINT=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=minioadmin
      - OBJECT_STORAGE_SECRET_KEY=minioadmin
      - OBJECT_STORAGE_BUCKET=leafleter
    volumes:
      - backend_data:/app/data
    depends_on:
      - backend
      - redis
    networks:
      - leafleter

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: leafleter-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - leafleter

  redis:
    image: redis:7-alpine
    container_name: leafleter-redis
    restart: unless-stopped
    networks:
      - leafleter
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: leafleter-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    networks:
      - leafleter

volumes:
  backend_data:
  redis_data:
  minio_data:

networks:
  leafleter:
    driver: bridge
